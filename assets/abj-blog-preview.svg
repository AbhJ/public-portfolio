<?xml version="1.0" encoding="UTF-8"?>
<!--
  ABJ Blogs — preview illustration for the portfolio "Featured" card.
  ViewBox matches the card-image frame ratio so the SVG fills edge-to-edge
  without letterboxing alongside the square-ish logos used for other cards.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" preserveAspectRatio="xMidYMid slice" role="img" aria-label="ABJ Blogs preview">
  <defs>
    <!-- Walnut-toned background with warm tonal lift at top -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e2318" />
      <stop offset="60%" stop-color="#241a12" />
      <stop offset="100%" stop-color="#1b130c" />
    </linearGradient>
    <!-- Organic paper-like grain -->
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="5" stitchTiles="stitch"/>
      <feColorMatrix values="
        0 0 0 0 0.85
        0 0 0 0 0.72
        0 0 0 0 0.48
        0 0 0 0.10 0"/>
    </filter>
  </defs>

  <!-- Fill the full viewBox -->
  <rect width="500" height="300" fill="url(#bg)"/>
  <rect width="500" height="300" filter="url(#grain)" opacity="0.9"/>

  <!-- Top nav strip -->
  <line x1="0" y1="40" x2="500" y2="40" stroke="#fff" stroke-opacity="0.08"/>
  <text x="24" y="26" font-family="Georgia, 'Instrument Serif', serif"
        font-size="14" font-style="italic" fill="#f4e7cc">ABJ</text>
  <text x="368" y="26" font-family="-apple-system, 'Inter', sans-serif"
        font-size="8" font-weight="500" fill="#eadfc8" opacity="0.7">Writing</text>
  <text x="408" y="26" font-family="-apple-system, 'Inter', sans-serif"
        font-size="8" font-weight="500" fill="#eadfc8" opacity="0.7">Portfolio</text>
  <circle cx="468" cy="23" r="4" fill="none" stroke="#eadfc8" stroke-width="1.2" opacity="0.75"/>
  <g stroke="#eadfc8" stroke-width="1.1" stroke-linecap="round" opacity="0.75">
    <line x1="468" y1="15" x2="468" y2="17"/>
    <line x1="468" y1="29" x2="468" y2="31"/>
    <line x1="476" y1="23" x2="474" y2="23"/>
    <line x1="462" y1="23" x2="460" y2="23"/>
  </g>

  <!-- Hero -->
  <text x="24" y="78" font-family="'Instrument Serif', Georgia, serif"
        font-size="26" font-weight="400" fill="#f4e7cc" letter-spacing="-0.3">
    Abhijay Mitra
  </text>
  <text x="24" y="98" font-family="-apple-system, 'Inter', sans-serif"
        font-size="9" fill="#eadfc8" opacity="0.7">
    Writing about tech, life, and things in between.
  </text>

  <!-- Get to know me pill -->
  <rect x="24" y="108" width="108" height="18" rx="9" fill="#c9a36b" fill-opacity="0.08"
        stroke="#c9a36b" stroke-opacity="0.4"/>
  <text x="78" y="121" font-family="-apple-system, 'Inter', sans-serif"
        font-size="8.5" font-weight="500" fill="#d7b57e" text-anchor="middle">
    Get to know me  →
  </text>

  <!-- Post list — numbered rows with dates, matching the live blog index -->
  <g font-family="-apple-system, 'Inter', sans-serif" fill="#eadfc8">
    <line x1="24" y1="152" x2="476" y2="152" stroke="#fff" stroke-opacity="0.1"/>

    <!-- Row 1 -->
    <text x="34" y="170" font-size="9" opacity="0.5">6)</text>
    <text x="54" y="170" font-size="10" font-weight="500">God is an Introvert</text>
    <text x="466" y="170" font-size="8" opacity="0.5" text-anchor="end">Feb 25, 2022</text>
    <line x1="24" y1="180" x2="476" y2="180" stroke="#fff" stroke-opacity="0.1"/>

    <!-- Row 2 -->
    <text x="34" y="198" font-size="9" opacity="0.5">5)</text>
    <text x="54" y="198" font-size="10" font-weight="500">Updates in Ubuntu 21.10</text>
    <text x="466" y="198" font-size="8" opacity="0.5" text-anchor="end">Oct 15, 2021</text>
    <line x1="24" y1="208" x2="476" y2="208" stroke="#fff" stroke-opacity="0.1"/>

    <!-- Row 3 -->
    <text x="34" y="226" font-size="9" opacity="0.5">4)</text>
    <text x="54" y="226" font-size="10" font-weight="500">My Review of 'Zero To One'</text>
    <text x="466" y="226" font-size="8" opacity="0.5" text-anchor="end">Oct 12, 2021</text>
    <line x1="24" y1="236" x2="476" y2="236" stroke="#fff" stroke-opacity="0.1"/>

    <!-- Row 4 -->
    <text x="34" y="254" font-size="9" opacity="0.5">3)</text>
    <text x="54" y="254" font-size="10" font-weight="500">Languages of the Future</text>
    <text x="466" y="254" font-size="8" opacity="0.5" text-anchor="end">Aug 21, 2021</text>
    <line x1="24" y1="264" x2="476" y2="264" stroke="#fff" stroke-opacity="0.1"/>

    <!-- Row 5 -->
    <text x="34" y="282" font-size="9" opacity="0.5">2)</text>
    <text x="54" y="282" font-size="10" font-weight="500">My Internship at Salesforce</text>
    <text x="466" y="282" font-size="8" opacity="0.5" text-anchor="end">Aug 20, 2021</text>
  </g>
</svg>
